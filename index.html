<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบควบคุมเกม (Host TV)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background: #1a1a2e; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .grid { display: flex; justify-content: space-around; margin-top: 20px; }
        .box { background: #162447; padding: 20px; border-radius: 10px; width: 45%; min-height: 300px; }
        button { background: #e43f5a; color: white; border: none; padding: 12px 24px; font-size: 18px; border-radius: 5px; cursor: pointer; margin: 10px; }
        .player-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #1f4068; }
        .bet-A { color: #ff4757; font-weight:bold; } .bet-B { color: #2ed573; font-weight:bold; }
        #roulette-zone { display: none; background: #ff4757; padding: 20px; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <h1> English Party Game </h1>
    <h2 id="room-status">สถานะ: รอผู้เล่นเข้าร่วม...</h2>
    <button id="start-btn" onclick="startGame()">เริ่มเกม (ปิดล็อคห้อง)</button>
    <button id="next-btn" onclick="nextRound()" style="display:none;">เฉลย & เริ่มตาถัดไป</button>

    <div id="quiz-area" style="display:none;">
        <h2 id="tv-question" style="font-size: 32px; color: #00adb5;">คำถามจะปรากฏที่นี่</h2>
    </div>

    <div id="roulette-zone">
        <h2> ตารัสเซียนรูเล็ต (สุ่มลงโทษ Top 5)</h2>
        <h3 id="roulette-target">กำลังสุ่มผู้เคราะห์ร้าย...</h3>
        <button onclick="triggerRoulette()">กดสุ่มลั่นไก!</button>
    </div>

    <div class="grid">
        <div class="box">
            <h3>รายชื่อผู้เล่น & เงินปัจจุบัน</h3>
            <div id="player-list"></div>
        </div>
        <div class="box">
            <h3>กระดานเดิมพันเรียลไทม์</h3>
            <div id="bet-board"></div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAUBz8QXDXKeoEKzSX0FyzlWvqmykU6ohU",
        authDomain: "fir-4d03b.firebaseapp.com",
        databaseURL: "https://fir-4d03b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "fir-4d03b",
        storageBucket: "fir-4d03b.firebasestorage.app",
        messagingSenderId: "1086058350982",
        appId: "1:1086058350982:web:1b8e91f7e20973fb0e8407",
        measurementId: "G-KLH0RTQG5W"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const quizData = [
        { q: "Which sentence is correct?", a: "He don't know.", b: "He doesn't know.", correct: "B" },
        { q: "Past tense of 'GO' is...", a: "Went", b: "Goed", correct: "A" },
        { q: "What is a synonym of 'Large'?", a: "Tiny", b: "Huge", correct: "B" }
    ];

    let currentRound = 0;

    // ล้างข้อมูลเก่าเมื่อเริ่ม Host ใหม่
    db.ref('room').set({ status: "waiting", currentQuestion: 0 });
    db.ref('players').remove();

    db.ref('players').on('value', snapshot => {
        const players = snapshot.val() || {};
        const playerList = document.getElementById('player-list');
        const betBoard = document.getElementById('bet-board');
        playerList.innerHTML = '';
        betBoard.innerHTML = '';

        Object.keys(players).forEach(key => {
            let p = players[key];
            playerList.innerHTML += `<div class='player-row'><span>${p.name}</span><span>฿${p.money.toLocaleString()}</span></div>`;
            if(p.betSide) {
                betBoard.innerHTML += `<div class='player-row'><span>${p.name}</span><span class='bet-${p.betSide}'>ฝั่ง ${p.betSide} (฿${p.betAmount})</span></div>`;
            }
        });
    });

    function startGame() {
        db.ref('room/status').set("playing");
        document.getElementById('room-status').innerText = "สถานะ: กำลังแข่งขัน";
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'inline-block';
        document.getElementById('quiz-area').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        if(currentRound >= quizData.length) {
            document.getElementById('tv-question').innerText = "จบเกมแล้ว!";
            document.getElementById('next-btn').style.display = 'none';
            return;
        }
        document.getElementById('tv-question').innerText = `ข้อที่ ${currentRound+1}: ${quizData[currentRound].q}`;
        
        db.ref('players').once('value', snapshot => {
            snapshot.forEach(child => {
                child.ref.update({ betSide: "", betAmount: 0 });
            });
        });

        if ((currentRound + 1) % 3 === 0) {
            document.getElementById('roulette-zone').style.display = 'block';
        } else {
            document.getElementById('roulette-zone').style.display = 'none';
        }
    }

    function nextRound() {
        let correctAns = quizData[currentRound].correct;
        db.ref('players').once('value', snapshot => {
            snapshot.forEach(child => {
                let p = child.val();
                if(p.betSide === correctAns) {
                    child.ref.update({ money: p.money + p.betAmount });
                } else if(p.betSide !== "") {
                    child.ref.update({ money: p.money - p.betAmount });
                }
            });
            currentRound++;
            loadQuestion();
        });
    }

    function triggerRoulette() {
        db.ref('players').once('value', snapshot => {
            let playersArr = [];
            snapshot.forEach(child => {
                playersArr.push({ id: child.key, name: child.val().name, money: child.val().money });
            });
            playersArr.sort((a, b) => b.money - a.money);
            let top5 = playersArr.slice(0, 5);

            if(top5.length > 0) {
                let victim = top5[Math.floor(Math.random() * top5.length)];
                let penalty = Math.floor(victim.money * 0.35);
                db.ref(`players/${victim.id}`).update({ money: victim.money - penalty });
                document.getElementById('roulette-target').innerText = `💥 ${victim.name} โดนหักเงิน ฿${penalty}!`;
            }
        });
    }
</script>
</body>
</html>
