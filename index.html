<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Game Master Control</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { 
            font-family: 'Arial', sans-serif; background: #050505; color: #fff; 
            margin: 0; padding: 20px; overflow-x: hidden;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; background: rgba(255,255,255,0.05); border-radius: 15px; margin-bottom: 20px;
        }
        .quiz-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px; border-radius: 25px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel {
            background: #111; border-radius: 20px; padding: 20px; border: 1px solid #333;
        }
        .player-row {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.03); margin-bottom: 8px; padding: 12px 20px; border-radius: 10px;
        }
        .chip { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .chip-A { background: #ff4757; }
        .chip-B { background: #2ed573; }
        
        button {
            padding: 15px 30px; border-radius: 10px; border: none; cursor: pointer;
            font-weight: bold; font-size: 16px; transition: 0.2s;
        }
        .btn-primary { background: #00d2ff; color: #000; }
        .btn-next { background: #ffd700; color: #000; }
        
        #roulette-zone {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 500px; background: #ff4757; padding: 40px;
            border-radius: 30px; box-shadow: 0 0 100px rgba(255, 71, 87, 0.5);
            display: none; z-index: 100; text-align: center; border: 5px solid white;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; color: #00d2ff;">🇬🇧 English Party Game</h1>
        <div id="room-status" style="background: #2ed573; color: black; padding: 5px 15px; border-radius: 20px;">Waiting...</div>
    </div>

    <div class="quiz-card" id="quiz-area" style="display:none;">
        <h3 style="opacity: 0.8; margin: 0;">QUESTION</h3>
        <h1 id="tv-question" style="font-size: 48px;">เตรียมตัวเริ่มเกม...</h1>
        <div style="margin-top: 20px;">
            <button class="btn-next" id="next-btn" onclick="nextRound()">✅ เฉลยและเริ่มตาถัดไป</button>
        </div>
    </div>
    
    <div style="text-align: center; margin-bottom: 20px;">
        <button class="btn-primary" id="start-btn" onclick="startGame()">🚀 เริ่มเกม (ปิดล็อคห้อง)</button>
    </div>

    <div id="roulette-zone">
        <h1 style="font-size: 50px;">🚨 RUSSIAN ROULETTE</h1>
        <h3 id="roulette-target">Top 5 ระวังตัวไว้!</h3>
        <button style="background:white; color:red; font-size: 24px;" onclick="triggerRoulette()">ลั่นไก! (Fire!)</button>
    </div>

    <div class="grid">
        <div class="panel">
            <h3 style="border-bottom: 2px solid #333; padding-bottom: 10px;">🏆 อันดับเศรษฐี</h3>
            <div id="player-list"></div>
        </div>
        <div class="panel">
            <h3 style="border-bottom: 2px solid #333; padding-bottom: 10px;">📊 กระดานเดิมพัน</h3>
            <div id="bet-board"></div>
        </div>
    </div>

<script>
    // ... ส่วน Firebase และ Logic เดิม ...
    // เพิ่มการเรียงลำดับผู้เล่น (Ranking) ในหน้าจอแสดงผล
    db.ref('players').on('value', snapshot => {
        const players = snapshot.val() || {};
        const playerList = document.getElementById('player-list');
        const betBoard = document.getElementById('bet-board');
        
        playerList.innerHTML = '';
        betBoard.innerHTML = '';

        // แปลงเป็น Array เพื่อเรียงลำดับเงิน
        const playersArr = Object.keys(players).map(key => players[key])
                                .sort((a, b) => b.money - a.money);

        playersArr.forEach(p => {
            playerList.innerHTML += `
                <div class='player-row'>
                    <span>${p.name}</span>
                    <span style="color:#ffd700; font-weight:bold;">฿${p.money.toLocaleString()}</span>
                </div>`;
            
            if(p.betSide) {
                betBoard.innerHTML += `
                    <div class='player-row'>
                        <span>${p.name}</span>
                        <span class="chip chip-${p.betSide}">${p.betSide} (฿${p.betAmount.toLocaleString()})</span>
                    </div>`;
            }
        });
    });

    // เพิ่มเอฟเฟกต์การสุ่ม (ตัวอย่างคร่าวๆ)
    function setupRoulette() {
        document.getElementById('roulette-zone').style.display = 'block';
    }
</script>
</body>
</html>
