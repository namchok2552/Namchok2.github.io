<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Game Master Control Hub</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { 
            font-family: 'Arial', sans-serif; background: #050505; color: #fff; 
            margin: 0; padding: 20px; text-align: center;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; background: rgba(255,255,255,0.05); border-radius: 15px; margin-bottom: 20px;
        }
        .quiz-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px; border-radius: 25px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: #111; border-radius: 20px; padding: 20px; border: 1px solid #333; min-height: 400px; }
        
        .player-row {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.03); margin-bottom: 8px; padding: 12px 20px; border-radius: 10px;
        }
        .chip { padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; }
        .chip-A { background: #ff4757; color: white; }
        .chip-B { background: #2ed573; color: white; }
        
        button {
            padding: 15px 30px; border-radius: 10px; border: none; cursor: pointer;
            font-weight: bold; font-size: 18px; transition: 0.2s;
        }
        .btn-start { background: #00d2ff; color: #000; }
        .btn-next { background: #ffd700; color: #000; }

        #roulette-zone {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 500px; background: #ff4757; padding: 40px;
            border-radius: 30px; box-shadow: 0 0 100px rgba(255, 71, 87, 0.7);
            display: none; z-index: 100; border: 5px solid white;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; color: #00d2ff;">🇬🇧 English Party Game</h1>
        <div id="room-status" style="background: #ff4757; padding: 5px 15px; border-radius: 20px;">Waiting...</div>
    </div>

    <div class="quiz-card" id="quiz-area" style="display:none;">
        <h3 id="round-label" style="opacity: 0.8; margin: 0;">QUESTION 1</h3>
        <h1 id="tv-question" style="font-size: 50px; margin: 20px 0;">เตรียมตัวให้พร้อม!</h1>
        <button class="btn-next" onclick="nextRound()">✅ เฉลยและข้อถัดไป</button>
    </div>
    
    <button class="btn-start" id="start-btn" onclick="startGame()">🚀 เริ่มเกมและล็อคห้อง</button>

    <div id="roulette-zone">
        <h1 style="font-size: 50px;">💥 ROULETTE!</h1>
        <h3 id="roulette-target" style="font-size: 24px;">สุ่มลงโทษ Top 5...</h3>
        <button style="background:white; color:red;" onclick="triggerRoulette()">ลั่นไก!</button>
    </div>

    <div class="grid">
        <div class="panel">
            <h3>🏆 Leaderboard (เรียงตามเงิน)</h3>
            <div id="player-list"></div>
        </div>
        <div class="panel">
            <h3>📊 กระดานเดิมพัน Real-time</h3>
            <div id="bet-board"></div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAUBz8QXDXKeoEKzSX0FyzlWvqmykU6ohU",
        authDomain: "fir-4d03b.firebaseapp.com",
        databaseURL: "https://fir-4d03b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "fir-4d03b",
        storageBucket: "fir-4d03b.firebasestorage.app",
        messagingSenderId: "1086058350982",
        appId: "1:1086058350982:web:1b8e91f7e20973fb0e8407",
        measurementId: "G-KLH0RTQG5W"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const quizData = [
        { q: "Which sentence is correct?", a: "He don't know.", b: "He doesn't know.", correct: "B" },
        { q: "Past tense of 'GO' is...", a: "Went", b: "Goed", correct: "A" },
        { q: "What is a synonym of 'Large'?", a: "Tiny", b: "Huge", correct: "B" }
    ];

    let currentRound = 0;

    // ล้างข้อมูลเก่าเมื่อรีโหลดหน้าโฮสต์
    db.ref('room').set({ status: "waiting", currentQuestion: 0 });
    db.ref('players').remove();

    db.ref('players').on('value', snapshot => {
        const players = snapshot.val() || {};
        const playerList = document.getElementById('player-list');
        const betBoard = document.getElementById('bet-board');
        
        playerList.innerHTML = '';
        betBoard.innerHTML = '';

        // จัดอันดับผู้เล่นตามเงิน
        const sortedPlayers = Object.keys(players).map(k => ({...players[k], id: k}))
                                .sort((a,b) => b.money - a.money);

        sortedPlayers.forEach(p => {
            playerList.innerHTML += `
                <div class='player-row'>
                    <span>${p.name}</span>
                    <span style="color:#ffd700; font-weight:bold;">฿${p.money.toLocaleString()}</span>
                </div>`;
            
            if(p.betSide) {
                betBoard.innerHTML += `
                    <div class='player-row'>
                        <span>${p.name}</span>
                        <span class="chip chip-${p.betSide}">ฝั่ง ${p.betSide} (฿${p.betAmount.toLocaleString()})</span>
                    </div>`;
            }
        });
    });

    function startGame() {
        db.ref('room/status').set("playing");
        document.getElementById('room-status').innerText = "LIVE";
        document.getElementById('room-status').style.background = "#2ed573";
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        if(currentRound >= quizData.length) {
            document.getElementById('tv-question').innerText = "จบเกมแล้ว! ยินดีกับผู้ชนะ";
            return;
        }
        document.getElementById('round-label').innerText = `QUESTION ${currentRound + 1}`;
        document.getElementById('tv-question').innerText = quizData[currentRound].q;
        
        // รีเซ็ตสถานะการเดิมพันของทุกคนในหน้าเซิร์ฟเวอร์
        db.ref('players').once('value', snapshot => {
            snapshot.forEach(child => {
                child.ref.update({ betSide: "", betAmount: 0 });
            });
        });

        if ((currentRound + 1) % 3 === 0) {
            document.getElementById('roulette-zone').style.display = 'block';
        } else {
            document.getElementById('roulette-zone').style.display = 'none';
        }
    }

    function nextRound() {
        let correctAns = quizData[currentRound].correct;
        db.ref('players').once('value', snapshot => {
            snapshot.forEach(child => {
                let p = child.val();
                if(p.betSide === correctAns) {
                    child.ref.update({ money: p.money + p.betAmount });
                } else if(p.betSide !== "") {
                    child.ref.update({ money: p.money - p.betAmount });
                }
            });
        });

        currentRound++;
        setTimeout(loadQuestion, 1000);
    }

    function triggerRoulette() {
        db.ref('players').once('value', snapshot => {
            let list = [];
            snapshot.forEach(c => { list.push({id: c.key, name: c.val().name, money: c.val().money}); });
            list.sort((a,b) => b.money - a.money);
            let top5 = list.slice(0, 5);
            if(top5.length > 0) {
                let victim = top5[Math.floor(Math.random() * top5.length)];
                let loss = Math.floor(victim.money * 0.35);
                db.ref(`players/${victim.id}`).update({ money: victim.money - loss });
                document.getElementById('roulette-target').innerText = `💥 ${victim.name} โดนยิง! เงินหายไป ฿${loss.toLocaleString()}`;
                setTimeout(() => { document.getElementById('roulette-zone').style.display = 'none'; }, 3000);
            }
        });
    }
</script>
</body>
</html>
