<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Host Master Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background: #050505; color: #fff; margin: 0; padding: 20px; }
        .quiz-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 30px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: #111; border-radius: 20px; padding: 20px; border: 1px solid #333; }
        .player-row { display: flex; justify-content: space-between; background: rgba(255,255,255,0.03); margin-bottom: 8px; padding: 10px 20px; border-radius: 10px; }
        
        .chip { padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        .chip-A { background: #ff4757; }
        .chip-B { background: #2ed573; }
        .chip-C { background: #1e90ff; }
        .chip-D { background: #ffa502; }
        
        button { padding: 12px 25px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-main { background: #00d2ff; color: #000; }
    </style>
</head>
<body>

    <div class="quiz-card" id="quiz-area" style="display:none;">
        <h1 id="tv-question" style="font-size: 40px;">กดเริ่มเกมเพื่อดึงคำถาม</h1>
        <div id="choices-display" style="display:flex; justify-content: center; gap: 20px; font-size: 20px; margin: 15px 0;"></div>
        <button class="btn-main" onclick="nextRound()">✅ เฉลยและข้อถัดไป</button>
    </div>

    <div style="text-align: center; margin-bottom: 20px;">
        <button id="start-btn" class="btn-main" onclick="startGame()">🚀 เริ่มเกม (ล็อคห้อง)</button>
    </div>

    <div class="grid">
        <div class="panel">
            <h3>🏆 Leaderboard</h3>
            <div id="player-list"></div>
        </div>
        <div class="panel">
            <h3>📊 กระดานเดิมพัน</h3>
            <div id="bet-board"></div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAUBz8QXDXKeoEKzSX0FyzlWvqmykU6ohU",
        authDomain: "fir-4d03b.firebaseapp.com",
        databaseURL: "https://fir-4d03b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "fir-4d03b",
        storageBucket: "fir-4d03b.firebasestorage.app",
        messagingSenderId: "1086058350982",
        appId: "1:1086058350982:web:1b8e91f7e20973fb0e8407",
        measurementId: "G-KLH0RTQG5W"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // คลังคำถามแบบ 4 ตัวเลือก
    const quizData = [
        { q: "1 + 1 = ?", options: {A:"1", B:"2", C:"3", D:"4"}, correct: "B" },
        { q: "What color is the sky?", options: {A:"Red", B:"Green", C:"Blue", D:"Black"}, correct: "C" },
        { q: "Synonym of 'Fast'?", options: {A:"Slow", B:"Quick", C:"Heavy", D:"Light"}, correct: "B" }
    ];

    let currentRound = 0;
    db.ref('room').set({ status: "waiting" });
    db.ref('players').remove();

    db.ref('players').on('value', snapshot => {
        const players = snapshot.val() || {};
        const playerList = document.getElementById('player-list');
        const betBoard = document.getElementById('bet-board');
        playerList.innerHTML = ''; betBoard.innerHTML = '';

        const sorted = Object.keys(players).map(k => ({...players[k], id: k})).sort((a,b) => b.money - a.money);
        sorted.forEach(p => {
            playerList.innerHTML += `<div class='player-row'><span>${p.name}</span><span style='color:#ffd700'>฿${p.money.toLocaleString()}</span></div>`;
            if(p.betSide) {
                betBoard.innerHTML += `<div class='player-row'><span>${p.name}</span><span class='chip chip-${p.betSide}'>${p.betSide} (฿${p.betAmount.toLocaleString()})</span></div>`;
            }
        });
    });

    function startGame() {
        db.ref('room/status').set("playing");
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        if(currentRound >= quizData.length) {
            document.getElementById('tv-question').innerText = "จบเกม!";
            return;
        }
        const data = quizData[currentRound];
        document.getElementById('tv-question').innerText = `ข้อ ${currentRound+1}: ${data.q}`;
        
        let choiceHtml = "";
        for(let key in data.options) {
            choiceHtml += `<span class='chip chip-${key}'>${key}: ${data.options[key]}</span>`;
        }
        document.getElementById('choices-display').innerHTML = choiceHtml;

        db.ref('players').once('value', snapshot => {
            snapshot.forEach(c => c.ref.update({ betSide: "", betAmount: 0 }));
        });
    }

    function nextRound() {
        let correctAns = quizData[currentRound].correct;
        db.ref('players').once('value', snapshot => {
            snapshot.forEach(child => {
                let p = child.val();
                if(p.betSide === correctAns) {
                    child.ref.update({ money: p.money + p.betAmount });
                } else if(p.betSide !== "") {
                    child.ref.update({ money: p.money - p.betAmount });
                }
            });
        });
        currentRound++;
        setTimeout(loadQuestion, 1000);
    }
</script>
</body>
</html>
